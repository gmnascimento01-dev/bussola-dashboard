<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bússola — dashboard</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root {
    --bg:#0F1310; --surface:#171D18; --feed-bg:#141914; --border:#232B25; --border-soft:#202820;
    --hover:#1c231d; --text:#EDF2ED; --text-dim:#8A968B; --text-dim2:#6B786C; --text-dim3:#7C8A7D;
    --chip-bg:#1F2620; --chip-border:#2A332B; --track-bg:#20271F; --tab-bg:#12160F; --tab-ativa-bg:#232B25;
    --input-bg:#12160F; --accent-green:#4CC38A; --accent-red:#E2574C; --accent-amber:#E3A548;
    --alerta-bg:#211C13; --alerta-border:#4A3B1E; --alerta-texto:#C9BFA3; --alerta-item:#D8CDAE;
    --erro-bg:#2A1615; --erro-border:#6B2A26; --erro-texto:#F2B8B4;
  }
  [data-theme="light"] {
    --bg:#F4F7F1; --surface:#FFFFFF; --feed-bg:#FFFFFF; --border:#E2E8DC; --border-soft:#E9EEE3;
    --hover:#F0F4EA; --text:#1A2118; --text-dim:#5B6B5C; --text-dim2:#7A8A7B; --text-dim3:#63715F;
    --chip-bg:#EFF3EA; --chip-border:#DCE4D6; --track-bg:#E4EADF; --tab-bg:#EAEFE5; --tab-ativa-bg:#FFFFFF;
    --input-bg:#F4F7F1; --accent-green:#2E9E68; --accent-red:#C64B3F; --accent-amber:#B87C22;
    --alerta-bg:#FBF1DE; --alerta-border:#E6CE9C; --alerta-texto:#6B5A32; --alerta-item:#5C4C29;
    --erro-bg:#FBEAE7; --erro-border:#E7B4AC; --erro-texto:#8A2E24;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:20px 16px 60px; transition:background .15s ease, color .15s ease; }
  ::placeholder { color:#6b7a6d; }
  input:focus, select:focus, button:focus-visible { outline:2px solid var(--accent-green); outline-offset:2px; }
  .wordmark { font-family:'Fraunces', serif; font-weight:600; font-size:30px; letter-spacing:-0.01em; }
  .tagline { color:var(--text-dim3); font-size:13px; }
  .header-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; justify-content:space-between; }
  .header-right { display:flex; gap:8px; align-items:center; }
  .grid { display:grid; grid-template-columns:1.3fr 1fr; gap:16px; max-width:1080px; margin:16px auto 0; }
  @media (max-width:720px) { .grid { grid-template-columns:1fr; } }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; }
  .card-alerta { background:var(--alerta-bg); border:1px solid var(--alerta-border); border-radius:14px; padding:16px; }
  .feed { background:var(--feed-bg); border:1px solid var(--border-soft); border-radius:14px; padding:6px; display:flex; flex-direction:column; gap:2px; max-height:600px; overflow-y:auto; }
  .linha { display:flex; justify-content:space-between; align-items:center; padding:10px; border-radius:10px; gap:8px; flex-wrap:wrap; }
  .linha:hover { background:var(--hover); }
  .linha-esq { display:flex; gap:10px; align-items:center; min-width:0; }
  .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .desc { font-size:13.5px; font-weight:500; }
  .meta-linha { font-size:11px; color:var(--text-dim2); margin-top:1px; }
  .chip { background:var(--chip-bg); border:1px solid var(--chip-border); border-radius:20px; padding:4px 8px; font-size:11.5px; }
  .valor { font-family:'IBM Plex Mono', monospace; font-size:13.5px; font-weight:600; min-width:88px; text-align:right; }
  .tabs { display:flex; gap:4px; background:var(--tab-bg); padding:4px; border-radius:10px; margin-bottom:12px; }
  .tab { flex:1; background:transparent; border:none; color:var(--text-dim); padding:6px 8px; border-radius:7px; font-size:12.5px; cursor:pointer; font-family:inherit; }
  .tab.ativa { background:var(--tab-ativa-bg); color:var(--text); font-weight:600; }
  .saldo-label { font-size:12px; color:var(--text-dim); }
  .saldo-valor { font-family:'IBM Plex Mono', monospace; font-size:28px; font-weight:600; margin:2px 0 10px; }
  .duas-colunas { display:flex; gap:24px; }
  .mini-label { font-size:11px; color:var(--text-dim); }
  .mini-valor { font-family:'IBM Plex Mono', monospace; font-size:14.5px; font-weight:600; }
  .categorias-titulo { font-size:12.5px; color:var(--text-dim); margin-bottom:10px; font-weight:600; }
  .barra-linha { margin-bottom:10px; }
  .barra-topo { display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px; }
  .barra-valor { font-family:'IBM Plex Mono', monospace; color:var(--text-dim2); }
  .barra-track { height:7px; border-radius:6px; overflow:hidden; background:var(--track-bg); }
  .barra-fill { height:100%; border-radius:6px; }
  .vazio { color:var(--text-dim2); font-size:13px; padding:24px 14px; text-align:center; }
  .btn { background:var(--accent-green); color:#0F1310; border:none; border-radius:10px; padding:10px 16px; font-weight:600; cursor:pointer; font-size:13px; }
  .btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border); border-radius:8px; padding:8px 12px; cursor:pointer; font-size:12.5px; }
  .btn-icon { background:transparent; color:var(--text-dim); border:1px solid var(--border); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; }
  .setup-box { max-width:420px; margin:80px auto; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; }
  .setup-box label { font-size:12.5px; color:var(--text-dim); display:block; margin:14px 0 6px; }
  .setup-box input { width:100%; background:var(--input-bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px; font-size:13px; font-family:'IBM Plex Mono', monospace; }
  .erro { background:var(--erro-bg); border:1px solid var(--erro-border); color:var(--erro-texto); border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:13px; }
  .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:1080px; margin:16px auto 0; }
  @media (max-width:900px) { .charts-row { grid-template-columns:1fr; } }
  .charts-row.full { grid-template-columns:1fr; }
  .chart-titulo { font-size:12.5px; color:var(--text-dim); margin-bottom:12px; font-weight:600; }
  .chart-box { position:relative; height:220px; }
</style>
<script>
  // Aplica o tema salvo antes de pintar a página, pra evitar flash de tema errado
  (function() {
    const salvo = localStorage.getItem('bussola-tema') || 'dark';
    document.documentElement.setAttribute('data-theme', salvo);
  })();
</script>
</head>
<body>

<div id="app"></div>

<script>
const API_CONFIG_KEY = 'bussola-config';

function getConfig() {
  const params = new URLSearchParams(window.location.search);
  const urlWorker = params.get('workerUrl');
  const urlToken = params.get('token');
  if (urlWorker && urlToken) {
    const cfg = { workerUrl: urlWorker, token: urlToken };
    setConfig(cfg);
    return cfg;
  }
  try { return JSON.parse(localStorage.getItem(API_CONFIG_KEY)); } catch { return null; }
}
function setConfig(cfg) {
  localStorage.setItem(API_CONFIG_KEY, JSON.stringify(cfg));
}
function fmtMoeda(v) {
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

let estado = {
  periodo: 'mes',
  resumo: null,
  transacoes: [],
  serieMensal: null,
  carregando: true,
  erro: null,
};

let charts = {};

async function carregarDados() {
  const cfg = getConfig();
  if (!cfg) { renderSetup(); return; }
  estado.carregando = true;
  estado.erro = null;
  render();
  try {
    const base = cfg.workerUrl.replace(/\/$/, '');
    const [resResumo, resTx, resSerie] = await Promise.all([
      fetch(base + '/api/resumo?periodo=' + estado.periodo + '&token=' + encodeURIComponent(cfg.token)),
      fetch(base + '/api/transacoes?token=' + encodeURIComponent(cfg.token)),
      fetch(base + '/api/serie-mensal?meses=6&token=' + encodeURIComponent(cfg.token)),
    ]);
    if (!resResumo.ok || !resTx.ok || !resSerie.ok) throw new Error('Falha ao buscar dados (verifique a URL e o token)');
    estado.resumo = await resResumo.json();
    const dadosTx = await resTx.json();
    estado.transacoes = dadosTx.transacoes || [];
    estado.serieMensal = await resSerie.json();
  } catch (err) {
    estado.erro = err.message || 'Não consegui carregar os dados.';
  } finally {
    estado.carregando = false;
    render();
  }
}

function renderSetup(msgErro) {
  document.getElementById('app').innerHTML = `
    <div class="setup-box">
      <div class="wordmark">Bússola</div>
      <div class="tagline">conectar ao seu bot</div>
      ${msgErro ? `<div class="erro" style="margin-top:16px;">${msgErro}</div>` : ''}
      <label>URL do Worker (Cloudflare)</label>
      <input id="in-url" placeholder="https://bussola-bot.seunome.workers.dev" />
      <label>Token do dashboard</label>
      <input id="in-token" placeholder="o mesmo valor do DASHBOARD_TOKEN" />
      <button class="btn" style="margin-top:18px; width:100%;" onclick="salvarConfig()">Conectar</button>
    </div>
  `;
}

function salvarConfig() {
  const url = document.getElementById('in-url').value.trim();
  const token = document.getElementById('in-token').value.trim();
  if (!url || !token) return;
  setConfig({ workerUrl: url, token });
  carregarDados();
}

function trocarPeriodo(p) {
  estado.periodo = p;
  carregarDados();
}

function desconectar() {
  localStorage.removeItem(API_CONFIG_KEY);
  render();
}

function getTema() {
  return document.documentElement.getAttribute('data-theme') || 'dark';
}
function alternarTema() {
  const novo = getTema() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', novo);
  localStorage.setItem('bussola-tema', novo);
  render();
  if (estado.serieMensal) desenharGraficos(estado.serieMensal);
}
function corVar(nome) {
  return getComputedStyle(document.documentElement).getPropertyValue(nome).trim();
}

function render() {
  const cfg = getConfig();
  if (!cfg) { renderSetup(); return; }

  const app = document.getElementById('app');
  const periodos = [['dia','Dia'],['semana','Semana'],['mes','Mês'],['ano','Ano']];

  let categoriasHtml = '';
  let alertaHtml = '';
  if (estado.resumo && estado.resumo.categorias && estado.resumo.categorias.length) {
    const maior = Math.max(...estado.resumo.categorias.map(c => c.valor));
    categoriasHtml = estado.resumo.categorias.map(c => `
      <div class="barra-linha">
        <div class="barra-topo"><span>${c.nome}</span><span class="barra-valor">${fmtMoeda(c.valor)}</span></div>
        <div class="barra-track"><div class="barra-fill" style="width:${(c.valor/maior*100)}%; background:${c.reducivel ? 'var(--accent-amber)' : 'var(--accent-green)'};"></div></div>
      </div>
    `).join('');

    const reduziveis = estado.resumo.categorias.filter(c => c.reducivel);
    const totalReduzivel = reduziveis.reduce((s,c) => s + c.valor, 0);
    if (totalReduzivel > 0) {
      alertaHtml = `
        <div class="card-alerta">
          <div style="font-weight:600; font-size:13.5px; margin-bottom:8px;">💡 Gastos possivelmente redutíveis</div>
          <div style="font-size:13px; color:var(--alerta-texto); line-height:1.5;">Neste período, <b>${fmtMoeda(totalReduzivel)}</b> foram para categorias que costumam dar espaço pra economia:</div>
          <ul style="margin:10px 0; padding-left:18px; font-size:12.5px; color:var(--alerta-item); line-height:1.9;">
            ${reduziveis.map(c => `<li>${c.nome} — ${fmtMoeda(c.valor)}</li>`).join('')}
          </ul>
        </div>
      `;
    }
  }

  const feedHtml = estado.transacoes.length === 0
    ? '<div class="vazio">Nenhum lançamento ainda.</div>'
    : estado.transacoes.map(t => {
        const cor = t.tipo === 'entrada' ? 'var(--accent-green)' : 'var(--accent-red)';
        const data = new Date(t.data_hora);
        return `
          <div class="linha">
            <div class="linha-esq">
              <span class="dot" style="background:${cor};"></span>
              <div>
                <div class="desc">${t.descricao || t.texto}</div>
                <div class="meta-linha">${data.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} · ${data.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <span class="chip">${t.categoria}</span>
              <span class="valor" style="color:${cor};">${t.tipo === 'entrada' ? '+' : '−'} ${fmtMoeda(t.valor)}</span>
            </div>
          </div>
        `;
      }).join('');

  app.innerHTML = `
    <div class="header-row">
      <div>
        <span class="wordmark">Bússola</span>
        <span class="tagline" style="margin-left:10px;">seu dinheiro, sua direção</span>
      </div>
      <div class="header-right">
        <button class="btn-icon" onclick="alternarTema()" title="Alternar tema">${getTema() === 'dark' ? '☀️' : '🌙'}</button>
        <button class="btn-ghost" onclick="desconectar()">Trocar conexão</button>
      </div>
    </div>

    ${estado.erro ? `<div class="erro" style="max-width:1080px; margin:14px auto 0;">${estado.erro}</div>` : ''}

    <div class="grid">
      <div>
        <div class="feed">
          ${estado.carregando ? '<div class="vazio">Carregando…</div>' : feedHtml}
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div class="card">
          <div class="tabs">
            ${periodos.map(([p,label]) => `<button class="tab ${estado.periodo===p?'ativa':''}" onclick="trocarPeriodo('${p}')">${label}</button>`).join('')}
          </div>
          ${estado.resumo ? `
            <div class="saldo-label">Saldo do período</div>
            <div class="saldo-valor" style="color:${estado.resumo.saldo>=0?'var(--accent-green)':'var(--accent-red)'};">${fmtMoeda(estado.resumo.saldo)}</div>
            <div class="duas-colunas">
              <div><div class="mini-label">Entradas</div><div class="mini-valor" style="color:var(--accent-green);">${fmtMoeda(estado.resumo.entradas)}</div></div>
              <div><div class="mini-label">Saídas</div><div class="mini-valor" style="color:var(--accent-red);">${fmtMoeda(estado.resumo.saidas)}</div></div>
            </div>
            ${categoriasHtml ? `<div style="border-top:1px solid #202820; padding-top:12px; margin-top:14px;"><div class="categorias-titulo">Por categoria</div>${categoriasHtml}</div>` : ''}
          ` : '<div class="vazio">Carregando…</div>'}
        </div>
        ${alertaHtml}
      </div>
    </div>

    ${estado.serieMensal ? `
    <div class="charts-row">
      <div class="card">
        <div class="chart-titulo">Evolução do saldo (últimos 6 meses)</div>
        <div class="chart-box"><canvas id="chart-saldo"></canvas></div>
      </div>
      <div class="card">
        <div class="chart-titulo">Entradas x saídas por mês</div>
        <div class="chart-box"><canvas id="chart-entradas-saidas"></canvas></div>
      </div>
    </div>
    <div class="charts-row full">
      <div class="card">
        <div class="chart-titulo">Categorias ao longo do tempo (top 5)</div>
        <div class="chart-box"><canvas id="chart-categorias"></canvas></div>
      </div>
    </div>
    ` : ''}
  `;

  if (estado.serieMensal) desenharGraficos(estado.serieMensal);
}

function labelMes(chave) {
  const [ano, mes] = chave.split('-').map(Number);
  const d = new Date(ano, mes - 1, 1);
  return d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' }).replace('.', '');
}

function getOpcoesChartBase() {
  const textDim = corVar('--text-dim');
  const borderSoft = corVar('--border-soft');
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: textDim, font: { family: 'Inter', size: 11 } } } },
    scales: {
      x: { ticks: { color: textDim, font: { family: 'Inter', size: 11 } }, grid: { color: borderSoft } },
      y: { ticks: { color: textDim, font: { family: 'IBM Plex Mono', size: 10 } }, grid: { color: borderSoft } },
    },
  };
}

function desenharGraficos(dados) {
  if (typeof Chart === 'undefined') {
    ['chart-saldo', 'chart-entradas-saidas', 'chart-categorias'].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.parentElement.innerHTML = '<div class="vazio">Não consegui carregar a biblioteca de gráficos (Chart.js). Tenta recarregar a página.</div>';
    });
    return;
  }

  const labels = dados.serie.map((m) => labelMes(m.mes));
  const opcoesBase = getOpcoesChartBase();
  const corVerde = corVar('--accent-green');
  const corVermelho = corVar('--accent-red');
  const corAmbar = corVar('--accent-amber');

  Object.values(charts).forEach((c) => c && c.destroy());

  const ctxSaldo = document.getElementById('chart-saldo');
  if (ctxSaldo) {
    charts.saldo = new Chart(ctxSaldo, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Saldo',
          data: dados.serie.map((m) => m.saldo),
          borderColor: corVerde,
          backgroundColor: corVerde + '26',
          fill: true,
          tension: 0.3,
          pointBackgroundColor: corVerde,
        }],
      },
      options: { ...opcoesBase, plugins: { legend: { display: false } } },
    });
  }

  const ctxEntSai = document.getElementById('chart-entradas-saidas');
  if (ctxEntSai) {
    charts.entradasSaidas = new Chart(ctxEntSai, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Entradas', data: dados.serie.map((m) => m.entradas), backgroundColor: corVerde },
          { label: 'Saídas', data: dados.serie.map((m) => m.saidas), backgroundColor: corVermelho },
        ],
      },
      options: opcoesBase,
    });
  }

  const ctxCat = document.getElementById('chart-categorias');
  if (ctxCat && dados.topCategorias && dados.topCategorias.length) {
    const cores = [corVerde, corAmbar, '#5B8DEF', corVermelho, '#B679D6'];
    charts.categorias = new Chart(ctxCat, {
      type: 'line',
      data: {
        labels,
        datasets: dados.topCategorias.map((cat, i) => ({
          label: cat,
          data: dados.serie.map((m) => m.categorias[cat] || 0),
          borderColor: cores[i % cores.length],
          backgroundColor: cores[i % cores.length],
          tension: 0.3,
          pointRadius: 3,
        })),
      },
      options: opcoesBase,
    });
  }
}

carregarDados();
</script>
</body>
</html>
